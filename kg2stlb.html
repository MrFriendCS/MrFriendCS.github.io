<!DOCTYPE html> 
<html lang="en-gb">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <title>Kilos to Stones</title>
        
        <style>

            /* For mobile phones: */

            * {
                margin: 0;
            }

            body {
                background-color: burlywood;
                font-family: sans-serif;
                margin: 2vw 5vw;
            }

            h1 {
                font-size: 7.5vw;
                margin-top: 2vw;
                margin-bottom: 5vw;
            }

            input, label {
                font-size: 4vw;
            }

            p {
                font-size: 5vw;
            }

            .topMargin {
                margin-top: 2vw;
                margin-bottom: 10vw;
            }

            #callout {
                font-weight: bold;
            }

            /* For desktop: */
            @media only screen and (min-width: 600px) {
                
                .left {
                    float: left;
                    width: 40vw;
                    margin-top: 2vw;
                    margin-left: 2vw;
                }

                .right {
                    float: right;
                    width: 40vw;
                    margin-top: 2vw;
                    margin-right: 2vw;
                }

            }
        </style>
        
    </head>

    <body>
        <h1>Kilograms to Stones</h1>

        <div class="left">
            <form>
                <label for="kilos">Kg:</label>
                <!--input type="number" id="kilos" min="60" max="120" value="75.0" step="0.1" onchange="convert()"-->
                <input type="range" id="kilos" min="60" max="80" value="75.0" step="0.1" onchange="convert()">
            </form>
        </div>

        <div class="right">
            <p>Weight: <span id="weight">11 st 11 lb</span></p>
        </div>
        

        <script>
            function convert(){

                var kg = document.getElementById("kilos").value;

                var realKG = parseFloat(kg);

                var stones = parseInt(realKG / 6.35029318);
                var pounds = Math.round(((realKG % 6.35029318) / 6.35029318 ) * 14);

                document.getElementById("weight").innerHTML = String(stones) + " st " + String(pounds) + " lbs";

                }
        </script>
    </body>

</html>
