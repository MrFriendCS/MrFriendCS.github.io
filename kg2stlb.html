<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kg to Stones & Pounds</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #f5f5f5;
        padding-top: 40px;
        padding-bottom: 80px; /* moves buttons up */
    }

    .output {
        font-size: 3rem;
        font-weight: bold;
        margin-bottom: 30px;
    }

    .input-section {
        margin-bottom: 30px;
    }

    input {
        font-size: 2rem;
        width: 60%;
        padding: 10px;
        text-align: center;
    }

    .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        width: 90%;
        max-width: 500px;
    }

    button {
        font-size: 1.8rem;
        padding: 25px;
        border: none;
        border-radius: 12px;
        background-color: #2c7be5;
        color: white;
    }

    button:active {
        background-color: #1a5fc1;
    }
</style>
</head>
<body>

<div class="output" id="result">0 st 0 lb</div>

<div class="input-section">
    <input type="number" id="kgInput" step="0.1" value="75.0">
    <div>kilograms</div>
</div>

<div class="buttons">
    <button onclick="changeKg(-0.1)">-0.1 kg</button>
    <button onclick="changeKg(0.1)">+0.1 kg</button>
    <button onclick="changeKg(-1)">-1 kg</button>
    <button onclick="changeKg(1)">+1 kg</button>
</div>

<script>
const kgInput = document.getElementById("kgInput");
const result = document.getElementById("result");

function convert() {
    let kg = parseFloat(kgInput.value);
    if (isNaN(kg) || kg < 0) kg = 0;

    // Convert kg to total ounces
    const totalOunces = kg * 35.27396195; // 1 kg = 35.27396195 oz

    let stones = Math.floor(totalOunces / (14 * 16));
    let remainingOunces = totalOunces - (stones * 14 * 16);

    let pounds = Math.floor(remainingOunces / 16);
    let ounces = Math.round(remainingOunces % 16);

    // Handle rounding overflow
    if (ounces === 16) {
        ounces = 0;
        pounds += 1;
    }

    if (pounds === 14) {
        pounds = 0;
        stones += 1;
    }

    result.textContent = stones + " st " + pounds + " lb " + ounces + " oz";
}

function changeKg(amount) {
    let current = parseFloat(kgInput.value);
    if (isNaN(current)) current = 0;

    current += amount;
    if (current < 0) current = 0;

    kgInput.value = current.toFixed(1);
    convert();
}

kgInput.addEventListener("input", convert);

convert();
</script>

</body>
</html>
