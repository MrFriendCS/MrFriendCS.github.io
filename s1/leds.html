<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Micro:bit LED Simulator</title>

<style>

body{
    background:#8f8888;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial, sans-serif;
}

/* MICROBIT BOARD */

.microbit{
    position:relative;
    width:360px;
    height:420px;
    background:#111;
    border-radius:28px;
    box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

/* LED GRID */

.grid{
    position:absolute;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    display:grid;
    grid-template-columns: repeat(5, 38px);
    grid-template-rows: repeat(5, 52px);
    gap:12px;
}

.led{
    width:38px;
    height:52px;
    background:#0b0b0b;
    border-radius:10px;
    border:2px solid #222;
    cursor:pointer;
    transition:0.12s;
}

.led.on{
    background:#ff2a2a;
    box-shadow:
        0 0 6px #ff2a2a,
        0 0 14px #ff2a2a,
        inset 0 0 4px #ff8080;
}

/* BUTTONS */

.button{
    position:absolute;
    width:45px;
    height:45px;
    background:#222;
    border-radius:30%;
    border:4px solid #8f8f8f;
    box-shadow: inset 0 3px 6px rgba(0,0,0,0.7);
}

.button:active{
    transform:scale(0.95);
}

.buttonA{
    left:0px;
    top:180px;
}

.buttonB{
    right:0px;
    top:180px;
}

/* GOLD PIN RINGS */

.pin{
    position:absolute;
    width:80px;
    height:30px;
    border-radius:30%;
    border:8px solid #d4a017;
    bottom:70px;
}

.pin1{
    left:130px;
    top:15px;
}
.pin2{
    width:5px;
    height:5px;
    border:4px solid #d4a017;
    left:155px;
    top:30px;
    }
.pin3{
    width:5px;
    height:5px;
    border:4px solid #d4a017;
    left:190px;
    top:30px;
    }

/* EDGE CONNECTOR */

.edge{
    position:absolute;
    bottom:-20px;
    left:0;
    width:100%;
    height:40px;
    background:linear-gradient(
        90deg,
        #caa000 0px,#caa000 8px,
        #111 8px,#111 16px
    );
    background-size:16px 100%;
}

</style>
</head>

<body>

<div class="microbit">

    <div class="grid" id="grid"></div>

    <div class="button buttonA"></div>
    <div class="button buttonB"></div>

    <div class="pin pin1"></div>
    <div class="pin pin2"></div>
    <div class="pin pin3"></div>

    <div class="edge"></div>

</div>

<script>

const grid = document.getElementById("grid");

for(let i=0;i<25;i++){
    const led = document.createElement("div");
    led.className = "led";

    led.addEventListener("click", () => {
        led.classList.toggle("on");
    });

    grid.appendChild(led);
}

</script>

</body>
</html>
